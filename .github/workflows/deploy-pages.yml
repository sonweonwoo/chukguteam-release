name: Deploy homepage to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "index.html"
      - "chukguteam.apk"
      - ".github/workflows/deploy-pages.yml"
  workflow_dispatch:

# Pages 배포에 필요한 권한
permissions:
  contents: read
  pages: write
  id-token: write

# 동시 배포 방지 (진행 중 배포는 취소하지 않음)
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: 체크아웃
        uses: actions/checkout@v4

      - name: Pages 설정 (없으면 자동 활성화)
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: 배포용 사이트 구성
        run: |
          mkdir -p _site
          cp index.html _site/index.html
          # 홈페이지의 "APK 직접 다운로드" 링크가 작동하도록 APK 포함
          if [ -f chukguteam.apk ]; then cp chukguteam.apk _site/chukguteam.apk; fi

      - name: 아티팩트 업로드
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: GitHub Pages 배포
        id: deployment
        uses: actions/deploy-pages@v4
